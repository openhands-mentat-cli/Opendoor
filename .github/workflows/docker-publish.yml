name: MCP Server Docker Publish

on:
  push:
    branches: [ main ]
    paths:
      - 'mcp-server/**'
      - 'Dockerfile.opendoor-mcp'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker tag to build'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/opendoor-mcp

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-opendoor-mcp
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest,enable={{is_default_branch}}
          type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
        labels: |
          org.opencontainers.image.title=Opendoor MCP Server
          org.opencontainers.image.description=Production-grade Model Context Protocol server with multi-language support
          org.opencontainers.image.vendor=Opendoor Team
          org.opencontainers.image.licenses=MIT
          org.opencontainers.image.source=https://github.com/${{ github.repository }}
          org.opencontainers.image.documentation=https://github.com/${{ github.repository }}/blob/main/mcp-server/README.md

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.opendoor-mcp
        platforms: linux/amd64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker image
      run: |
        echo "🧪 Testing published Docker image..."
        
        # Start container in background with health check
        docker run --rm -d --name test-published-mcp \
          -p 3000:3000 \
          -p 3001:3001 \
          -e MCP_TRANSPORT=sse \
          -e NODE_ENV=production \
          --health-cmd="curl -f http://localhost:3000/health || exit 1" \
          --health-interval=10s \
          --health-timeout=5s \
          --health-retries=5 \
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        
        # Wait for container to be healthy
        echo "⏳ Waiting for container to be healthy..."
        for i in {1..30}; do
          HEALTH_STATUS=$(docker inspect test-published-mcp --format='{{.State.Health.Status}}' 2>/dev/null || echo "starting")
          if [ "$HEALTH_STATUS" = "healthy" ]; then
            echo "✅ Container is healthy!"
            break
          elif [ "$HEALTH_STATUS" = "unhealthy" ]; then
            echo "❌ Container is unhealthy"
            docker logs test-published-mcp
            docker stop test-published-mcp
            exit 1
          elif [ $i -eq 30 ]; then
            echo "❌ Container failed to become healthy after 30 attempts"
            docker logs test-published-mcp
            docker stop test-published-mcp
            exit 1
          fi
          echo "⏳ Attempt $i/30, status: $HEALTH_STATUS, waiting 5 seconds..."
          sleep 5
        done
        
        # Test health endpoint directly
        echo "🔍 Testing health endpoint..."
        if curl -f http://localhost:3000/health; then
          echo "✅ Health endpoint test passed!"
        else
          echo "❌ Health endpoint test failed"
          docker logs test-published-mcp
          docker stop test-published-mcp
          exit 1
        fi
        
        # Show container logs for debugging
        echo "📋 Container logs (last 30 lines):"
        docker logs test-published-mcp --tail 30
        
        # Cleanup
        docker stop test-published-mcp

    - name: Generate SBOM
      uses: anchore/sbom-action@v0
      with:
        image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        format: spdx-json
        output-file: sbom.spdx.json

    - name: Upload SBOM
      uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: sbom.spdx.json

    - name: Update package description
      run: |
        echo "📝 Updating package description..."
        curl -X PATCH \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/user/packages/container/opendoor%2Fopendoor-mcp \
          -d '{
            "description": "Production-grade Model Context Protocol server with multi-language code execution, VS Code integration, and browser automation capabilities"
          }' || echo "⚠️ Failed to update package description"

    - name: Publish summary
      run: |
        echo "🎉 Opendoor MCP Server Docker image published successfully!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 📦 Published Images" >> $GITHUB_STEP_SUMMARY
        echo "- \`ghcr.io/${{ github.repository }}/opendoor-mcp:latest\`" >> $GITHUB_STEP_SUMMARY
        echo "- \`ghcr.io/${{ github.repository }}/opendoor-mcp:${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 🚀 Quick Start" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
        echo "# Run with SSE transport (recommended)" >> $GITHUB_STEP_SUMMARY
        echo "docker run -d --name opendoor-mcp \\" >> $GITHUB_STEP_SUMMARY
        echo "  -p 3000:3000 -p 3001:3001 \\" >> $GITHUB_STEP_SUMMARY
        echo "  -v /var/run/docker.sock:/var/run/docker.sock \\" >> $GITHUB_STEP_SUMMARY
        echo "  ghcr.io/${{ github.repository }}/opendoor-mcp:latest" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "# Access documentation at http://localhost:3001" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 🔗 Integration" >> $GITHUB_STEP_SUMMARY
        echo "Visit http://localhost:3001 for LLM client configuration examples." >> $GITHUB_STEP_SUMMARY